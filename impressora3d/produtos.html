<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0b1020"/>
  <title>Impressora3D — Produtos</title>
  <link rel="stylesheet" href="../style.css"/>
  <link rel="stylesheet" href="imp3d-pages.css"/>
</head>
<body class="app-shell">
  <header class="imp3d-topbar">
    <a class="imp3d-back" href="../index.html#tab-imp3d">← Voltar</a>
    <div class="imp3d-page-title">
      <h2>Produtos</h2>
      <p>Cadastro de itens, custos e preço</p>
    </div>
  </header>

  <div class="month-incrementer app-month-bar" style="margin:12px 12px 8px;">
    <button id="prev-month" class="pill-btn">‹</button>
    <div class="month-display">
      <span class="month-caption">Índice do mês</span>
      <span id="month-index" class="month-index">0</span>
      <span id="month-label" class="month-label"></span>
    </div>
    <button id="next-month" class="pill-btn">›</button>
  </div>

  <main class="wrap app-main imp3d-page">
    <section class="imp3d-folder">
      <div class="imp3d-folder-head">
        <div>
          <span class="imp3d-folder-kicker">Arquivo 02</span>
          <h3 class="card-title">📦 Produtos (cadastro)</h3>
        </div>
        <span class="imp3d-folder-badge">Tabela base</span>
      </div>

      <p class="panel-subtitle">Organize seus produtos em caixas e cadastre os custos de fabricação.</p>

      <div class="form-grid imp3d-form-grid">
        <div class="form-field" style="grid-column:1/-1">
          <label>Caixa / Categoria</label>
          <input id="prod-category" type="text" placeholder="Ex: Chaveiros, Decoração, Vasos..."/>
        </div>
        <div class="form-field">
          <label>Nome do produto</label>
          <input id="prod-name" type="text" placeholder="Ex: Miniatura A"/>
        </div>
        <div class="form-field">
          <label>Horas de impressão</label>
          <input id="prod-hours" type="number" step="0.1" placeholder="Horas"/>
        </div>
        <div class="form-field">
          <label>Filamento por unidade (g)</label>
          <input id="prod-fil-g" type="number" step="0.01" placeholder="Gramas por peça"/>
        </div>
        <div class="form-field">
          <label>Custo energia (R$/h)</label>
          <input id="prod-energy-h" type="number" step="0.01" placeholder="Custo por hora (R$)"/>
        </div>
        <div class="form-field">
          <label>Custo embalagem (R$)</label>
          <input id="prod-pack" type="number" step="0.01" placeholder="Custo embal. por unidade"/>
        </div>
        <div class="form-field">
          <label>Preço de venda (R$)</label>
          <input id="prod-price" type="number" step="0.01" placeholder="Preço de venda"/>
        </div>
        <div class="form-field" style="grid-column:1/-1">
          <label>Descrição (opcional)</label>
          <input id="prod-desc" type="text" placeholder="Detalhes do produto"/>
        </div>
        <div class="form-actions" style="grid-column:1/-1">
          <button id="prod-add" class="btn-primary" type="button">Cadastrar produto</button>
        </div>
      </div>

      <div class="imp3d-list-head" style="margin-top: 24px; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid rgba(148,163,184,0.1); padding-bottom: 12px;">
        <h4 style="min-width: 200px;">Estoque de Produtos</h4>
        <div style="flex: 1; min-width: 200px; display: flex; align-items: center; gap: 10px;">
          <input type="text" id="prod-search" placeholder="🔍 Buscar por nome ou caixa..." style="width: 100%; padding: 10px 14px; border-radius: 999px; background: rgba(0,0,0,0.2); border: 1px solid rgba(148,163,184,0.2); color: #fff; font-size: 0.9rem;">
          <span class="imp3d-mini-note" id="imp3d-count-prod">0</span>
        </div>
      </div>

      <div id="prod-list" class="imp3d-list" style="margin-top: 14px;"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../script.js?v=9"></script>
  <script src="../sync-pluggy-ui.js?v=9"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('prod-search');
      if(searchInput){
        searchInput.addEventListener('input', () => {
          if(typeof renderProducts === 'function') renderProducts();
        });
      }
    });
  </script>
</body>
</html>
